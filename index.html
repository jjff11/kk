<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>醉翁观影</title>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100dvh; display: flex; align-items: center; justify-content: center;
}

/* ── 登录页 ── */
#setup {
  width: 100%; max-width: 360px; padding: 40px 24px;
  display: flex; flex-direction: column; gap: 20px;
}
.logo { text-align: center; font-size: 22px; font-weight: 600; letter-spacing: -.5px; }
.logo span { color: #aaa; font-weight: 400; font-size: 13px; display: block; margin-top: 4px; }

.field label { font-size: 11px; color: #666; letter-spacing: .5px; text-transform: uppercase; display: block; margin-bottom: 6px; }
.field input {
  width: 100%; padding: 11px 13px; border-radius: 9px;
  border: 1px solid #222; background: #111; color: #fff;
  font-size: 15px; outline: none; transition: border-color .2s;
}
.field input:focus { border-color: #444; }

.seg { display: flex; gap: 8px; }
.seg button {
  flex: 1; padding: 11px 8px; border-radius: 9px;
  border: 1px solid #222; background: #111; color: #555;
  font-size: 13px; cursor: pointer; transition: all .15s; line-height: 1.4;
}
.seg button.on { border-color: #444; color: #fff; background: #1a1a1a; }

#goBtn {
  width: 100%; padding: 13px; border-radius: 9px; border: none;
  background: #fff; color: #000; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
#goBtn:hover { opacity: .88; }
#goBtn:disabled { opacity: .4; cursor: default; }
.err { font-size: 13px; color: #f77; text-align: center; min-height: 16px; }

/* ── 播放页 ── */
#player { display: none; flex-direction: column; width: 100%; height: 100dvh; }
video { flex: 1; width: 100%; object-fit: contain; background: #000; min-height: 0; display: block; }

/* 状态栏 */
#statusBar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; background: #0d0d0d;
  border-bottom: 1px solid #181818; flex-shrink: 0; font-size: 12px;
}
#statusBar .dot {
  width: 8px; height: 8px; border-radius: 50%; background: #333;
  flex-shrink: 0; transition: background .4s, box-shadow .4s;
}
#statusBar .dot.yellow { background: #fa0;  box-shadow: 0 0 6px #fa08; }
#statusBar .dot.green  { background: #4d4;  box-shadow: 0 0 6px #4d48; }
#statusBar .dot.red    { background: #f44;  box-shadow: 0 0 6px #f448; }
#statusText { color: #888; flex: 1; }
#peerBadge {
  font-size: 11px; padding: 3px 8px; border-radius: 20px;
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #666;
  transition: all .3s;
}
#peerBadge.online { border-color: #4d4; color: #4d4; background: #0a1a0a; }

/* 控制栏 */
#ctrlBar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: #0f0f0f;
  border-top: 1px solid #181818; flex-shrink: 0;
}
#btnPlay {
  padding: 7px 16px; border-radius: 7px; border: 1px solid #333;
  background: none; color: #fff; font-size: 15px; cursor: pointer; flex-shrink: 0;
}
#btnPlay:hover { border-color: #666; }
#btnPlay:disabled { opacity: .3; cursor: default; }
#prog {
  flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
  background: #2a2a2a; border-radius: 2px; cursor: pointer; outline: none;
}
#prog::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: #fff; cursor: pointer;
}
#prog:disabled { opacity: .3; cursor: default; }
#clock { font-size: 12px; color: #555; min-width: 90px; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>

<!-- 登录 -->
<div id="setup">
  <div class="logo">🎬 醉翁观影<span>纷繁世界，快意人生</span></div>
  <div class="field">
    <label>房间密码（AB 填一样）</label>
    <input type="password" id="room" placeholder="例如 movie123" autocomplete="off">
  </div>
  <div class="field">
    <label>我的角色</label>
    <div class="seg">
      <button class="on" id="bh" onclick="setRole('host')">🎬 主播 A<br><small>有视频文件</small></button>
      <button id="bg" onclick="setRole('guest')">📺 观看 B<br><small>无需视频文件</small></button>
    </div>
  </div>
  <input type="file" id="filePick" accept="video/*" style="display:none" onchange="onFilePicked()">
  <button id="goBtn" onclick="go()">进入房间</button>
  <p class="err" id="errMsg"></p>
</div>

<!-- 播放 -->
<div id="player">
  <div id="statusBar">
    <div class="dot" id="dot"></div>
    <span id="statusText">初始化…</span>
    <span id="peerBadge">对方未上线</span>
  </div>
  <video id="v" playsinline></video>
  <div id="ctrlBar">
    <button id="btnPlay" onclick="togglePlay()" disabled>▶</button>
    <input type="range" id="prog" value="0" step="0.1" disabled>
    <span id="clock">--:-- / --:--</span>
  </div>
</div>

<script>
// ── 填你的 Ably Key ──
const ABLY_KEY = 'N0Wq6w.VJcgBg:-YMvJiXfWpkeWj7MgxRQBpnjbiJTfyB6BMKSBp6xKv0';
// ────────────────────

let role = 'host', channel = null, pc = null, dc = null;
let ignoring = false, _room = null;
let canvasTimer = null, gainNode = null;
let reconnectTimer = null;
let isReconnecting = false;
let _offerHandler = null;
let _iceHandlerG  = null;
let _iceHandlerH  = null;

const v          = document.getElementById('v');
const prog       = document.getElementById('prog');
const btnPlay    = document.getElementById('btnPlay');
const clock      = document.getElementById('clock');
const dot        = document.getElementById('dot');
const statusText = document.getElementById('statusText');
const peerBadge  = document.getElementById('peerBadge');
const errMsg     = document.getElementById('errMsg');
const goBtn      = document.getElementById('goBtn');

const ICE = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'turn:openrelay.metered.ca:80',  username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
]};

// ── UI helpers ───────────────────────────────────────────
const fmt = s => {
  if (!isFinite(s) || isNaN(s)) return '--:--';
  s = Math.floor(s);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
};
function setStatus(color, text) {
  dot.className = 'dot ' + color;
  statusText.textContent = text;
}
function setPeer(online, label) {
  peerBadge.className = online ? 'online' : '';
  peerBadge.textContent = label;
}
function setRole(r) {
  role = r;
  document.getElementById('bh').className = r === 'host' ? 'on' : '';
  document.getElementById('bg').className  = r === 'guest' ? 'on' : '';
}
function showPlayer() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('player').style.display = 'flex';
  document.body.style.alignItems = 'stretch';
}

// ── 入口 ─────────────────────────────────────────────────
function go() {
  const room = document.getElementById('room').value.trim();
  if (!room) return (errMsg.textContent = '请填写房间密码');
  if (!ABLY_KEY || ABLY_KEY.includes('填你的')) return (errMsg.textContent = '请先填写 Ably Key');
  _room = room;
  goBtn.disabled = true;
  errMsg.textContent = '';
  if (role === 'host') {
    document.getElementById('filePick').click();
    goBtn.disabled = false;
  } else {
    startGuest();
  }
}

function onFilePicked() {
  const f = document.getElementById('filePick').files[0];
  if (!f) { goBtn.disabled = false; return; }
  v.src = URL.createObjectURL(f);
  v.load();
  startHost();
}

// ── Ably 连接（Ably 内置断线重连）───────────────────────
function ablyConnect() {
  return new Promise((res, rej) => {
    const ably = new Ably.Realtime({
      key: ABLY_KEY,
      closeOnUnload: true,
      disconnectedRetryTimeout: 3000,  // 断线 3s 后重试
      suspendedRetryTimeout: 10000,
    });
    ably.connection.on('connected',    () => res(ably.channels.get('room:' + _room)));
    ably.connection.on('failed',       () => rej(new Error('信令连接失败')));
    ably.connection.on('disconnected', () => setStatus('yellow', '信令断线，重连中…'));
    ably.connection.on('suspended',    () => setStatus('red',    '信令长时间断线'));
    setTimeout(() => rej(new Error('连接超时')), 10000);
  });
}

// ── 推流（Canvas + AudioContext，暂停不断流）────────────
function buildStream() {
  if (canvasTimer) { clearInterval(canvasTimer); canvasTimer = null; }

  const canvas = document.createElement('canvas');
  canvas.width  = v.videoWidth  || 1280;
  canvas.height = v.videoHeight || 720;
  const ctx = canvas.getContext('2d');

  canvasTimer = setInterval(() => {
    if (v.videoWidth && canvas.width !== v.videoWidth) {
      canvas.width = v.videoWidth; canvas.height = v.videoHeight;
    }
    ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
  }, 1000 / 30);

  const videoStream = canvas.captureStream(30);

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src  = audioCtx.createMediaElementSource(v);
  gainNode   = audioCtx.createGain();
  const dest = audioCtx.createMediaStreamDestination();
  src.connect(gainNode);
  gainNode.connect(dest);
  gainNode.connect(audioCtx.destination);
  gainNode.gain.value = v.paused ? 0 : 1;

  return new MediaStream([
    ...videoStream.getVideoTracks(),
    ...dest.stream.getAudioTracks(),
  ]);
}

// ── HOST ─────────────────────────────────────────────────
async function startHost() {
  showPlayer();
  setStatus('yellow', '正在连接信令…');
  setPeer(false, '对方未上线');
  btnPlay.disabled = true;
  prog.disabled = true;

  try { channel = await ablyConnect(); }
  catch (e) { setStatus('red', e.message); return; }

  setStatus('yellow', '信令就绪，等待对方上线…');
  channel.publish('host-ready', {});
  let hostHeartbeat = setInterval(() => channel.publish('host-ready', {}), 5000);
  v.pause();
  btnPlay.disabled = false;
  prog.disabled = false;

  // B 上线 → 建立 WebRTC
  channel.subscribe('guest-ready', async () => {
    if (isReconnecting) return; // 防止重复触发
    setPeer(true, '对方已上线 ✓');
    setStatus('yellow', '正在建立连接…');
    await createHostPC();
  });

  // B 离开
  channel.subscribe('guest-bye', () => {
    setPeer(false, '对方已离开');
    setStatus('yellow', '等待对方重新上线…');
    cleanupPC();
  });
}

async function createHostPC() {
  cleanupPC();
  pc = new RTCPeerConnection(ICE);

  dc = pc.createDataChannel('ctrl', { ordered: true });
  dc.onopen  = () => setStatus('green', '连接成功，正在推流');
  dc.onclose = () => {
    // DataChannel 关闭 = 连接断了，触发重连
    if (role === 'host') scheduleHostReconnect();
  };

  const stream = buildStream();
  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.onicecandidate = e => {
    if (e.candidate) channel.publish('host-ice', { candidate: e.candidate });
  };
  pc.onconnectionstatechange = () => {
    if (pc?.connectionState === 'failed') {
      setStatus('red', '连接失败，重连中…');
      scheduleHostReconnect();
    }
  };

  channel.unsubscribe('guest-answer');
  channel.unsubscribe('guest-ice');
  channel.subscribe('guest-answer', async ({ data }) => {
    if (pc?.signalingState !== 'have-local-offer') return;
    await pc.setRemoteDescription(data.sdp);
  });
  channel.subscribe('guest-ice', async ({ data }) => {
    if (data.candidate) await pc?.addIceCandidate(data.candidate).catch(() => {});
  });

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  channel.publish('host-offer', { sdp: pc.localDescription });
}

// A 端：等待 B 重新上线，自动重建
function scheduleHostReconnect() {
  if (reconnectTimer) return;
  setStatus('yellow', '等待对方重新上线…');
  setPeer(false, '对方已断开');
  cleanupPC();
  // 重新通告自己在线，等 B 再发 guest-ready
  reconnectTimer = setTimeout(() => { reconnectTimer = null; }, 2000);
}

// ── GUEST ────────────────────────────────────────────────
async function startGuest() {
  showPlayer();
  setStatus('yellow', '正在连接信令…');
  setPeer(false, '等待主播…');

  try { channel = await ablyConnect(); }
  catch (e) { setStatus('red', e.message); return; }

  setStatus('yellow', '信令就绪，等待主播…');
  setupGuestPC();

  // 收到主播心跳再响应，解决 B 先进无法连接的问题
  channel.subscribe('host-ready', () => {
    if (pc?.connectionState === 'connected') return;
    channel.publish('guest-ready', {});
  });

  // 离开时通知主播
  window.addEventListener('beforeunload', () => channel.publish('guest-bye', {}));
}

function setupGuestPC() {
  cleanupPC();
  pc = new RTCPeerConnection(ICE);

  pc.ontrack = e => {
    if (v.srcObject !== e.streams[0]) {
      v.srcObject = e.streams[0];
      v.play().catch(() => {});
    }
  };

  pc.ondatachannel = e => {
    dc = e.channel;
    dc.onopen  = () => {
      setStatus('green', '连接成功，正在接收推流');
      setPeer(true, '主播已连接 ✓');
    };
    dc.onclose = () => {
      setStatus('yellow', '连接断开，等待主播重连…');
      setPeer(false, '主播已断开');
      // B 端自动重建，等待新 offer
      scheduleGuestReconnect();
    };
    dc.onmessage = ({ data }) => {
      const m = JSON.parse(data);
      ignoring = true;
      if (m.t === 'play')  v.play().catch(() => {});
      if (m.t === 'pause') v.pause();
      setTimeout(() => ignoring = false, 500);
    };
  };

  pc.onicecandidate = e => {
    if (e.candidate) channel.publish('guest-ice', { candidate: e.candidate });
  };
  pc.onconnectionstatechange = () => {
    if (pc?.connectionState === 'failed') {
      setStatus('red', '连接失败，重连中…');
      scheduleGuestReconnect();
    }
  };

  if (_offerHandler) channel.unsubscribe('host-offer', _offerHandler);
  if (_iceHandlerG)  channel.unsubscribe('host-ice',   _iceHandlerG);

  _offerHandler = async ({ data }) => {
    setStatus('yellow', '正在握手…');
    cleanupPC();
    setupGuestPC();
    await pc.setRemoteDescription(data.sdp);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    channel.publish('guest-answer', { sdp: pc.localDescription });
  };
  _iceHandlerG = async ({ data }) => {
    if (data.candidate) await pc?.addIceCandidate(data.candidate).catch(() => {});
  };

  channel.subscribe('host-offer', _offerHandler);
  channel.subscribe('host-ice',   _iceHandlerG);
}

// B 端断连后：重新发 guest-ready，触发 A 重新 offer
function scheduleGuestReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    if (!channel) return;
    setStatus('yellow', '等待主播重新推流…');
    setupGuestPC();
  }, 2000);
}

// ── 清理 PC ──────────────────────────────────────────────
function cleanupPC() {
  if (pc) { pc.close(); pc = null; }
  dc = null;
}

// ── 播放控制 ─────────────────────────────────────────────
const ctrlSend = m => { if (role === 'host' && dc?.readyState === 'open') dc.send(JSON.stringify(m)); };

function togglePlay() { v.paused ? v.play() : v.pause(); }

v.addEventListener('play', () => {
  btnPlay.textContent = '⏸';
  if (gainNode) gainNode.gain.value = 1;
  if (!ignoring) ctrlSend({ t: 'play' });
});
v.addEventListener('pause', () => {
  btnPlay.textContent = '▶';
  if (gainNode) gainNode.gain.value = 0;
  if (!ignoring) ctrlSend({ t: 'pause' });
});
v.addEventListener('loadedmetadata', () => {
  if (isFinite(v.duration)) {
    prog.max = v.duration;
    clock.textContent = fmt(0) + ' / ' + fmt(v.duration);
  }
});
v.addEventListener('timeupdate', () => {
  if (!isFinite(v.duration) || !v.duration) return;
  prog.value = v.currentTime;
  clock.textContent = fmt(v.currentTime) + ' / ' + fmt(v.duration);
});
prog.addEventListener('input', () => { v.currentTime = parseFloat(prog.value); });
</script>
</body>
</html>
